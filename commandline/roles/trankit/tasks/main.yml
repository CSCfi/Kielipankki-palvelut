---

- name: Ensure necessary directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: 0775
  loop:
    - "{{ install_dir }}"
    - "{{ shared_models_dir }}"
    - "{{ module_path }}"
    - "{{ build_dir }}"

- name: Install apptainer .def file
  ansible.builtin.template:
    src: trankit.def.j2
    dest: "{{ build_dir }}/trankit.def"

- name: Build apptainer
  ansible.builtin.shell:
    cmd: "cd {{ build_dir }}; apptainer build --fakeroot trankit.sif trankit.def"
    creates: "{{ build_dir }}/trankit.sif"

- name: Install and wrap container with tykky
  ansible.builtin.shell:
    cmd: "bash -i -c 'module load tykky && wrap-container -w /usr/local/bin/python {{ build_dir }}/trankit.sif --prefix {{ install_dir }}'"

- name: Copy scripts to tykky-exported bin dir
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ install_dir }}/bin/{{ item }}"
    mode: 0775
  loop:
    - trankit2conllu

- name: Copy scripts to tykky's internal _bin dir
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ install_dir }}/_bin/{{ item }}"
    mode: 0775
  loop:
    - trankit2conllu

- name: Create lmod module
  ansible.builtin.template:
    src: module_template.j2
    dest: "{{ module_path }}/{{version}}.lua"
    mode: 0664

- name: Run tests and fetch shared language models
  ansible.builtin.include_tasks:
    file: fetch_model_and_run.yml
  vars:
    lang: "{{ item }}"
  loop:
    - finnish
    - english
    - swedish
    
- name: Remove build directory
  ansible.builtin.file:
    path: "{{ build_dir }}"
    state: absent

- name: Fix permissions (if shared group is set)
  file:
    path: "{{ item }}"
    group: "{{ shared_group }}"
    mode: "g+rwX,o+rX,o-w"
    recurse: yes
  with_items:
    - "{{ install_dir }}"
    - "{{ model_package_install_dir }}"
  when: shared_group is defined
