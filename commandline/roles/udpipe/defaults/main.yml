---
# defaults

package_name: udpipe
version: "{{ udpipe_version }}"
release_url: https://github.com/ufal/udpipe/archive/v{{ version }}.tar.gz
src_root: "{{ compile_root }}"
compile_dir: "{{ src_root }}/udpipe-{{ version }}/src"
install_dir: "{{ install_prefix }}/{{ package_name }}/{{ version }}"

model_package_version: ud-2.5-191206
language_models:
 - english-ewt
 - english-gum
 - english-lines
 - english-partut
 - finnish-ftb
 - finnish-tdt
 - swedish-lines
 - swedish-talbanken
model_package_install_dir: "{{ install_prefix }}/{{ package_name }}/models/"
model_package_release_url: "https://lindat.mff.cuni.cz/repository/server/api/core/bitstreams/handle/11234/1-3131/"
