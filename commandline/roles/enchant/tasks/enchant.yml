---

- name: Ensure dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: 0775
  loop:
    - "{{ compile_dir }}"
    - "{{ install_dir }}"
    - "{{ module_dir }}"

- name: Copy Apptainer def file
  ansible.builtin.copy:
    src: kp-spell.def
    dest: "{{ compile_dir }}"

- name: Build apptainer container
  ansible.builtin.shell:
  args:
    cmd: apptainer build kp-spell.sif kp-spell.def
    chdir: "{{ compile_dir }}"
    creates: kp-spell.sif

- name: Add group write permission to container
  file:
    path: "{{ compile_dir }}/kp-spell.sif"
    mode: g+w

- name: Make tykky wrappers
  ansible.builtin.shell: |
    /bin/bash -ic "module load tykky && \
    wrap-container -w /usr/bin/enchant-2 -w /usr/bin/enchant-lsmod-2 kp-spell.sif --prefix {{ install_dir }}"
  args:
    chdir: "{{ compile_dir }}"

- name: Install module file
  ansible.builtin.template:
    src: module_file.j2
    dest: "{{ module_dir }}/{{ package_version }}.lua"
    mode: 0664

- name: Quick test
  ansible.builtin.shell:
  args:
    cmd: bash -ic "module load kp-spell && echo 'Koiro kävelee.' | enchant-2 -l -d fi | grep Koirox || ( echo 'test failed'; exit 1 ) "