---

- name: Ensure directories exist
  become: no
  file:
    path: "{{ item }}"
    state: directory
  loop:
    # - "{{ src_root }}"
    - "{{ install_dir }}/bin"
    - "{{ lib_dir }}"
    - "{{ module_path }}"

- name: Download jar
  get_url:
    url: "{{ source_url }}"
    dest: "{{ lib_dir }}/{{ jar_name }}"
    mode: "g+rwX,o+rX"


- name: Create wrapper scripts
  template:
    src: heliots.j2
    dest: "{{ install_dir }}/bin/{{ item }}"
    mode: 0775
  loop:
    - heliots

- name: Install modulefile
  template:
    src: module_template.j2
    dest: "{{ module_path }}/{{ version }}.lua"
    mode: 0664

# quickly check that the module loads and heliots prints help
- name: Quick test
  shell:
    cmd: bash -i -c "module load heliots && heliots -h | grep urn:nbn:fi:lb-2021062801"


- name: Fix permissions (if shared group is set)
  file:
    path: "{{ install_dir }}"
    group: "{{ shared_group }}"
    mode: "g+rwX,o+rX,o-w"
    recurse: yes
  when: shared_group is defined
