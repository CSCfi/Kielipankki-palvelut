- name: Ensure compile_root
  file:
    path: "{{ item }}"
    state: directory
    mode: 0775
  with_items:
    - "{{ compile_root }}"

# Download first, this takes rather long
- name: Unpack from tar
  unarchive:
    src: "{{ tagtools_tar }}"
    dest: "{{ compile_root }}"
    remote_src: yes

# The earlier download minimizes the time the module is unusable
# if it is removed below
- name: "Remove current installation (via -t force_install)"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ tagtools_install_dir }}"
    - "{{ module_path }}/{{ version }}.lua"
  when: "'force_install' in ansible_run_tags"
# Not using "tags: ['never', force_install]": due to tag inheritance

- name: Ensure other directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: 0775
  with_items:
    - "{{ tagtools_install_dir }}"
    - "{{ tagtools_install_dir }}/bin"
    - "{{ compile_root }}"
    - "{{ module_path }}"

- name: Run make install
  make:
    chdir: "{{ compile_dir }}"
    target: install
    params:
      prefix: "{{ tagtools_install_dir }}"

- name: Install modulefile
  template:
    src: module_template.j2
    dest: "{{ module_path }}/{{ version }}.lua"
    mode: 0664

- name: Fix permissions (if shared group is set)
  file:
    path: "{{ item }}"
    group: "{{ shared_group }}"
    mode: "g+rwX,o+rX,o-w"
    recurse: yes
  loop:
    - "{{ tagtools_install_dir }}"
    - "{{ module_path }}"
  when: shared_group is defined

- name: Run make check-installed
  shell:
    chdir: "{{ compile_dir }}"
    cmd: "bash -i -c 'module use {{ module_root }} && module load finnish-tagtools hfst && make check-installed prefix={{ tagtools_install_dir }}'"

